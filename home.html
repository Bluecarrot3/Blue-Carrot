<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Blue Carrot — Home</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav>
        <a class="nav-logo" href="home.html">
            <!-- paste your carrot SVG here, or just use text: -->
            <span class="nav-logo-text">Blue Carrot</span>
        </a>
        <div class="search-wrap"
            style="position:relative;left:auto;transform:none;flex:1;max-width:480px;margin:0 auto">
            <span class="search-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    style="width:16px;height:16px">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </span>
            <input type="text" id="searchInput" placeholder="Search portfolios, roles…" autocomplete="off" />
        </div>
        <div class="nav-actions">
            <a href="messages.html" class="nav-icon-btn" title="Messages">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
            </a>
            <a href="create.html" class="nav-icon-btn" title="Create">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </a>
            <a href="profile.html" class="nav-icon-btn" title="Profile">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </a>
        </div>
    </nav>

    <div class="app-body">
        <div id="mainCol">
            <!-- HOME PAGE -->
            <div class="page" id="page-home">
                <div class="home-hero">
                    <h1>Find your creative team on <span class="brand-font">Blue Carrot</span></h1>
                    <p>Connect with artists, makers, and dreamers. Collaborate on projects that matter.</p>
                </div>
                <div class="grid" id="projectGrid"></div>
            </div>

            <!-- DETAIL PAGE (hidden by default) -->
            <div class="page" id="page-detail" style="display:none">
                <a class="back-btn" onclick="showHome()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6" />
                    </svg> Back
                </a>
                <div id="detailContent"></div>
            </div>
        </div>
    </div>

    <!-- APPLY MODAL -->
    <div class="modal-overlay" id="applyModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div class="step-dots" id="stepDots"></div>
            <div id="modalSteps"></div>
        </div>
    </div>

    <div id="toast"></div>
    <script src="app.js"></script>
    <script>
        // Init home page
        renderGrid(PROJECTS);
        document.getElementById('searchInput').addEventListener('input', e => filterProjects(e.target.value));

        function showHome() {
            document.getElementById('page-home').style.display = '';
            document.getElementById('page-detail').style.display = 'none';
        }
        function openProject(id) {
            const p = PROJECTS.find(x => x.id === id); if (!p) return;
            const svg = p.svgIdx != null ? PROJECT_SVGS[p.svgIdx % PROJECT_SVGS.length] : (p.customSvg || PROJECT_SVGS[0]);
            const tags = p.tags.map(t => `<span class="chip chip-role">${t}</span>`).join('');
            document.getElementById('detailContent').innerHTML = `
        <div class="detail-cover">${svg}</div>
        <h1 class="detail-title">${p.title}</h1>
        <div class="detail-meta">
          <span class="detail-meta-item"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${p.location}</span>
          <span class="detail-meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${p.date}</span>
          ${tags}
        </div>
        <div class="detail-section"><h3>About this Project</h3><p class="detail-desc">${p.description.split('\n\n')[0]}</p></div>
        <div class="detail-section"><h3>Creator</h3><p>${p.creator.name}</p></div>
        <div style="margin-top:24px;display:flex;gap:12px">
          <a href="profile.html?pid=${id}" class="btn btn-outline">View Profile</a>
          <button class="btn btn-primary" onclick="openApplyModal(${p.id})">Apply to Collaborate</button>
        </div>`;
            document.getElementById('page-home').style.display = 'none';
            document.getElementById('page-detail').style.display = '';
            window.scrollTo(0, 0);
        }
    </script>
</body>

</html>
