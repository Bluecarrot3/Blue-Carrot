<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Blue Carrot — Messages</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav>
        <a class="nav-logo" href="home.html"><span class="nav-logo-text">Blue Carrot</span></a>
        <div class="nav-actions">
            <a href="home.html" class="nav-icon-btn" title="Home">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </a>
            <a href="messages.html" class="nav-icon-btn active" title="Messages">
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                </svg>
            </a>
            <a href="create.html" class="nav-icon-btn" title="Create">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </a>
            <a href="profile.html" class="nav-icon-btn" title="Profile">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </a>
        </div>
    </nav>
    <div class="app-body">
        <div id="mainCol">
            <div class="page">
                <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:20px">Messages</h2>
                <div class="msg-layout">
                    <div class="msg-list" id="msgList"></div>
                    <div class="chat-pane" id="chatPane">
                        <div class="chat-empty">Select a conversation</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="toast"></div>
    <script src="app.js"></script>
    <script>
        // Render message list
        function renderMessages() {
            document.getElementById('msgList').innerHTML =
                `<div class="msg-header">Messages</div>` +
                MESSAGES_DATA.map((m, i) => `
          <div class="msg-item" onclick="selectMsg(${i})">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;font-size:.85rem">${m.name.split(' ').map(w => w[0]).join('').slice(0, 2)}</div>
            <div class="msg-item-info">
              <div class="msg-item-name">${m.name}</div>
              <div class="msg-item-preview">${m.preview}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span class="msg-item-time">${m.time}</span>
              ${m.unread ? '<span class="msg-unread"></span>' : ''}
            </div>
          </div>`).join('');
        }
        function selectMsg(i) {
            document.querySelectorAll('.msg-item').forEach((el, j) => el.classList.toggle('active', j === i));
            renderChat(i);
            document.getElementById('chatPane').classList.add('open');
        }
        function renderChat(i) {
            const m = MESSAGES_DATA[i];
            const bubbles = m.chat.map(b => `<div class="bubble ${b.mine ? 'mine' : 'theirs'}">${b.text}</div>`).join('');
            document.getElementById('chatPane').innerHTML = `
        <div class="chat-header">
          <button class="btn btn-ghost" style="padding:6px 10px;font-size:.8rem" onclick="document.getElementById('chatPane').classList.remove('open')">← Back</button>
          <div><h3>${m.name}</h3><p>${m.project}</p></div>
        </div>
        <div class="chat-messages" id="chatMsgs">${bubbles}</div>
        <div class="chat-input">
          <input type="text" id="chatIn" placeholder="Type a message…" onkeydown="sendMsg(event,${i})"/>
          <button class="btn btn-primary" onclick="sendMsg({key:'Enter'},${i})">Send</button>
        </div>`;
            const el = document.getElementById('chatMsgs');
            if (el) el.scrollTop = el.scrollHeight;
        }
        function sendMsg(e, i) {
            if (e.key !== 'Enter') return;
            const inp = document.getElementById('chatIn');
            const txt = inp.value.trim(); if (!txt) return;
            MESSAGES_DATA[i].chat.push({ mine: true, text: txt });
            inp.value = ''; renderChat(i);
        }
        renderMessages();
    </script>
</body>

</html>
